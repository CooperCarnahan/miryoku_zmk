# Corne + nice!nano v2 + nice!view, Miryoku (custom_config.h), mouse/pointing enabled
name: 'Build corne nice_view + mouse'
on:
  push:
    branches: [enable-mouse]
  workflow_dispatch:
jobs:
  build:
    uses: ./.github/workflows/main.yml
    secrets: inherit
    with:
      board: '["nice_nano_v2"]'
      shield: '["corne_left nice_view_adapter nice_view","corne_right nice_view_adapter nice_view"]'
      kconfig: '["CONFIG_ZMK_POINTING=y"]'
      # Pin ZMK to v0.3.0: last release with the old board layout (nice_nano_v2)
      # AND pointing/mouse support. zmk/main moved boards (HWMv2) and breaks -b nice_nano_v2.
      branches: '["zmkfirmware/zmk/v0.3.0"]'
